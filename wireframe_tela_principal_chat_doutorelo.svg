<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="980" viewBox="0 0 1440 980">
  <defs>
    <style>
      .bg { fill: #f7f4ee; }
      .panel { fill: #fffdf9; stroke: #d8d0c5; stroke-width: 2; }
      .panel-soft { fill: #fbf8f2; stroke: #ded6cb; stroke-width: 1.5; }
      .ink { fill: #1f2a2a; font-family: Inter, Arial, sans-serif; }
      .muted { fill: #6d7371; font-family: Inter, Arial, sans-serif; }
      .brand { fill: #0e5b4f; font-family: Inter, Arial, sans-serif; font-weight: 700; }
      .accent { fill: #0e5b4f; }
      .accent-soft { fill: #e0eee9; stroke: #9fc8bc; stroke-width: 1; }
      .warn { fill: #fff5df; stroke: #e4c778; stroke-width: 1; }
      .line { stroke: #d8d0c5; stroke-width: 2; }
      .chip { fill: #ffffff; stroke: #c8ddd6; stroke-width: 1.5; }
      .chat-user { fill: #e0eee9; stroke: #9fc8bc; stroke-width: 1.5; }
      .chat-ai { fill: #ffffff; stroke: #d8d0c5; stroke-width: 1.5; }
      .title { font-size: 30px; font-weight: 750; }
      .subtitle { font-size: 17px; }
      .label { font-size: 15px; font-weight: 650; }
      .body { font-size: 14px; }
      .small { font-size: 12px; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1440" height="980"/>
  <text class="brand title" x="70" y="68">DOUTORELO — wireframe da tela principal com chat progressivo</text>
  <text class="muted subtitle" x="70" y="96">Conversa primeiro. Sistema depois. Cadastro quando houver valor claro.</text>

  <!-- Panel 1 -->
  <rect class="panel" x="70" y="135" rx="28" ry="28" width="400" height="650"/>
  <text class="brand label" x="100" y="175">Estado 1: antes da primeira pergunta</text>
  <line class="line" x1="100" y1="195" x2="440" y2="195"/>
  <text class="brand" x="100" y="230" font-size="20" font-weight="700">DOUTORELO</text>
  <text class="muted small" x="347" y="230">Entrar</text>
  <text class="ink" x="117" y="318" font-size="24" font-weight="760">Qual é a sua dúvida</text>
  <text class="ink" x="144" y="350" font-size="24" font-weight="760">sobre saúde?</text>
  <rect class="panel-soft" x="105" y="385" rx="22" ry="22" width="330" height="100"/>
  <text class="muted body" x="130" y="425">Escreva sobre sintomas, exames,</text>
  <text class="muted body" x="130" y="447">remédios, hábitos ou prevenção...</text>
  <circle class="accent" cx="400" cy="435" r="22"/>
  <text x="393" y="442" fill="#fff" font-family="Arial" font-size="20">→</text>
  <rect class="chip" x="105" y="520" rx="15" ry="15" width="88" height="34"/>
  <text class="muted small" x="126" y="542">Sintoma</text>
  <rect class="chip" x="204" y="520" rx="15" ry="15" width="75" height="34"/>
  <text class="muted small" x="226" y="542">Exame</text>
  <rect class="chip" x="290" y="520" rx="15" ry="15" width="108" height="34"/>
  <text class="muted small" x="313" y="542">Remédio</text>
  <rect class="warn" x="105" y="615" rx="18" ry="18" width="330" height="78"/>
  <text class="muted small" x="130" y="646">Respostas educativas.</text>
  <text class="muted small" x="130" y="666">Não substitui atendimento médico.</text>
  <text class="accent body" x="118" y="745">Entrada leve, sem módulos competindo</text>

  <!-- Panel 2 -->
  <rect class="panel" x="520" y="135" rx="28" ry="28" width="400" height="650"/>
  <text class="brand label" x="550" y="175">Estado 2: depois da primeira pergunta</text>
  <line class="line" x1="550" y1="195" x2="890" y2="195"/>
  <text class="brand" x="550" y="230" font-size="20" font-weight="700">DOUTORELO</text>
  <text class="muted small" x="763" y="230">Conversa atual</text>
  <rect class="chat-user" x="610" y="270" rx="18" ry="18" width="260" height="72"/>
  <text class="ink body" x="635" y="304">Paracetamol faz mal</text>
  <text class="ink body" x="635" y="326">para o fígado?</text>
  <rect class="chat-ai" x="550" y="375" rx="18" ry="18" width="320" height="150"/>
  <text class="ink body" x="575" y="407">Pode fazer mal em doses altas,</text>
  <text class="ink body" x="575" y="429">uso repetido, álcool ou doença</text>
  <text class="ink body" x="575" y="451">no fígado. Para orientar melhor,</text>
  <text class="ink body" x="575" y="473">posso entender seu contexto?</text>
  <text class="muted small" x="575" y="505">Idade, dose, outros remédios...</text>
  <rect class="chip" x="550" y="550" rx="15" ry="15" width="130" height="34"/>
  <text class="muted small" x="568" y="572">Tenho exame</text>
  <rect class="chip" x="690" y="550" rx="15" ry="15" width="155" height="34"/>
  <text class="muted small" x="710" y="572">Uso remédios</text>
  <rect class="panel-soft" x="550" y="635" rx="22" ry="22" width="320" height="66"/>
  <text class="muted body" x="575" y="675">Escreva sua resposta...</text>
  <circle class="accent" cx="835" cy="668" r="20"/>
  <text x="829" y="675" fill="#fff" font-family="Arial" font-size="18">→</text>
  <text class="accent body" x="568" y="745">A landing se transforma em chat vivo</text>

  <!-- Panel 3 -->
  <rect class="panel" x="970" y="135" rx="28" ry="28" width="400" height="650"/>
  <text class="brand label" x="1000" y="175">Estado 3: cadastro e sistema progressivo</text>
  <line class="line" x1="1000" y1="195" x2="1340" y2="195"/>
  <rect class="chat-ai" x="1000" y="240" rx="18" ry="18" width="320" height="150"/>
  <text class="ink body" x="1025" y="272">Posso salvar esta conversa</text>
  <text class="ink body" x="1025" y="294">no seu histórico para acompanhar</text>
  <text class="ink body" x="1025" y="316">com mais segurança?</text>
  <text class="muted small" x="1025" y="350">Conta = memória, exames e continuidade.</text>
  <rect class="accent-soft" x="1000" y="420" rx="18" ry="18" width="320" height="58"/>
  <text class="brand body" x="1040" y="456">Criar conta e salvar histórico</text>
  <rect class="panel-soft" x="1000" y="495" rx="18" ry="18" width="320" height="58"/>
  <text class="muted body" x="1065" y="531">Continuar sem salvar</text>
  <text class="muted label" x="1000" y="602">Ferramentas reveladas pelo contexto</text>
  <rect class="chip" x="1000" y="625" rx="15" ry="15" width="84" height="34"/>
  <text class="muted small" x="1023" y="647">Exames</text>
  <rect class="chip" x="1095" y="625" rx="15" ry="15" width="88" height="34"/>
  <text class="muted small" x="1115" y="647">Hábitos</text>
  <rect class="chip" x="1194" y="625" rx="15" ry="15" width="126" height="34"/>
  <text class="muted small" x="1213" y="647">Especialista</text>
  <text class="accent body" x="1011" y="745">Cadastro surge quando há valor evidente</text>

  <!-- Flow footer -->
  <rect class="panel-soft" x="70" y="825" rx="24" ry="24" width="1300" height="98"/>
  <text class="brand label" x="110" y="865">Regra de ouro</text>
  <text class="ink subtitle" x="110" y="895">O DOUTORELO não pergunta “qual módulo você quer usar?”. Ele pergunta “qual é a sua dúvida sobre saúde?” e revela o cuidado certo pela conversa.</text>
</svg>
